<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selector */
        /* div{
            background-color: red;
        } */
        /* Class Selector */
        .red{
            background-color: red;
        }
        /* ID Selector */
        #green{
            background-color: green;
        }
        /* child Selector */
        div > p{
            background-color: brown;
        }
        /* Descendant Selector */
        div p{
            color: blue;
            background-color: yellow;
        }
        /* Universal Selector */
        *{
            margin:0;
            padding:0;
        }
        /* pseudo class selector */
        a:visited{
            color:blue;
        }
        a:link{
            color:green;
        }
        a:active{
            background-color: red;
        }
        a:hover{
            background-color: yellow;
        }
        p:first-child{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <main class="one">
        <p>I am first</p>
        <p>I am second</p>
    </main>
    <div class="red" >
        I am a div
        <article>
            <p> I AM PARA</p>
        </article>
    </div>
    <div id="green">
        Another div
    </div>
    <a href="https://google.com">Go to Google</a>
    <a href="https://facebook.com">Go to Facebook</a>
</body>
</html>
