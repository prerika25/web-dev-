<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .container{
            background-color: rgb(9, 103, 10);
            height:80vh;
            width:30vw;
        }
        .box{
            width:34px;
            height:45px;
            
            /* animation: prerikaAnimation;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0,0,0,0.96 );
            animation-delay: 1s;
            /* animation-direction: alternate-reverse; */
            /* animation-play-state: paused; */
            animation: prerikaAnimation 2s ease-in-out 3s 1,
                       prerika 3s ease-in-out 3s 1; 
        }
        @keyframes prerikaAnimation {
            from{
                background-color: red;
            }
            to{
                background-color: yellow;
                transform:translateX(1000px);
            }
        }
        @keyframes prerika {
            0%{
                transform: rotate(100deg);
            }
            20%{
                transform: rotate(200deg);
            }
            50%{
                transform: rotate(220deg);
            }
            80%{
                transform: rotate(300deg);
            }
            100%{
                transform: rotate(310deg);
            }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>
</body>
</html>
