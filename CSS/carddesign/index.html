<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card design</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body {
            background-color: grey;
            padding: 45px;
        }

        .card {
            background-color: white;
            width: 198px;
            height: 344px;
            border-radius: 7px;
        }

        .image {
            padding: 5px;
        }
        .image img {
            border-radius: 7px;
        }
        .content{
            padding: 13px; 
        }
        .content p{
            font-size:13px;
            font-style: buddle;
            color: gray;
        }
        .capsules{
            padding: 0 34px;
        }
        .capsules span{
            border:1px solid gray;
            padding:1px 4px;
            border-radius: 7px;
            font-size:12px;
        }
        .button{
            text-align: center;
        }
        .button button{
            padding:0px 13px;
            border-radius: 9px;
            background-color: rgb(197, 163, 163);
            color:blue;
            font-size:12px;
            border:none;
        }

    </style>
</head>

<body>
    <div class="card">


        <div class="image">
            <img width="188" src="https://img.freepik.com/premium-photo/man-boat-beach_865967-27208.jpg" alt="">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Prerika</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Neque ipsa dolore, illo esse hic harum facilis earum sapiente fugiat ratione voluptates rem debitis.
            </p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
