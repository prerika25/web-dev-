<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <style>
        /* img{
            filter: blur(10px);

        } */
        .img1{
            filter: brightness(122%) contrast(200%);
        }
        .img2{
            /* filter: invert(1); */
            filter:opacity(0.5);
        }
        .img3{
            /* filter: grayscale(20%); */
            filter:sepia(100%);
        }
    </style>
    
</head>
<body>
    <div class="container">
        <img class="img1" src="https://tse1.mm.bing.net/th/id/OIP.qEbyMYEXYOHc5zXd2RPX3wHaGL?rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
        <img class="img2" src="https://www.masala.com/cloud/2021/08/01/eNLV5Bq0-SRKMain-1200x1345.jpg" alt="">
        <img class="img3" src="https://tse2.mm.bing.net/th/id/OIP.VwRg5xKBhG1eKmfcSoPg-QHaFU?rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
    </div>
</body>
</html>
